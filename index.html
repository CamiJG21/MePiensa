<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaynar - Me Piensa</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }

        /* El truco del fondo desenfocado */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('portada.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(40%);
            transform: scale(1.1);
            z-index: -1;
        }

        /* Asegura que el contenedor resalte bonito sobre el fondo */
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 1;
            background: rgba(18, 18, 18, 0.6);
            padding: 25px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        /* La Portada */
        .cover {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 { font-size: 24px; margin: 10px 0 5px 0; letter-spacing: 1px; }
        h2 { font-size: 16px; color: #a7a7a7; margin: 0 0 25px 0; font-weight: 400; }

        /* El Contador */
        .countdown {
            font-size: 20px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Los Botones */
        .btn-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #282828;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            margin-bottom: 12px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-link:hover {
            background-color: #3e3e3e;
            transform: scale(1.02);
        }

        .btn-spotify { border-left: 5px solid #1DB954; }
    </style>
</head>
<body>

    <div class="container">
        <img src="portada.jpg" alt="Me Piensa Cover" class="cover">
        
        <h1>Me Piensa</h1>
        <h2>Jaynar</h2>

        <div class="countdown" id="timer">Cargando cuenta regresiva...</div>

        <a href="https://distrokid.com/hyperfollow/jaynar/me-piensa" target="_blank" class="btn-link btn-spotify">
            <span>Pre-Save en Spotify</span>
            <span>➔</span>
        </a>
    </div>

    <script>
        const releaseDate = new Date(2026, 4, 24, 0, 0, 0).getTime();

        const countdownFunction = setInterval(function() {
            const now = new Date().getTime();
            const distance = releaseDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

            if (distance < 0) {
                clearInterval(countdownFunction);
                document.getElementById("timer").innerHTML = "¡YA DISPONIBLE!";
            }
        }, 1000);
    </script>
</body>
</html>
