<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaynar - Me Piensa</title>
    <style>
        /* El "look & feel" de la página */
        body {
            body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }

        /* El truco del fondo desenfocado */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('portada.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(40%); /* Desenfoca y oscurece un poco para que se lea el texto */
            transform: scale(1.1); /* Evita bordes blancos por el blur */
            z-index: -1;
        }

        /* Asegura que el contenedor resalte bonito sobre el fondo */
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 1;
            background: rgba(18, 18, 18, 0.4); /* Un toque oscuro transparente detrás del contenido */
            padding: 25px;
            border-radius: 16px;
            backdrop-filter: blur(10px); /* Efecto vidrio esmerilado */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
<body>

    <div class="container">
        <img src="portada.jpg" alt="Me Piensa Cover" class="cover">
        
        <h1>Me Piensa</h1>
        <h2>Jaynar</h2>

        <div class="countdown" id="timer">Cargando cuenta regresiva...</div>

        <a href="https://distrokid.com/hyperfollow/jaynar/me-piensa" target="_blank" class="btn-link btn-spotify">
            <span>Pre-Save en Spotify</span>
            <span>➔</span>
        </a>
        
     
    </div>

    <script>
        // Establece la fecha de lanzamiento (Año, Mes-1, Día, Hora, Minutos)
        // Nota: Los meses en JavaScript van de 0 a 11 (Mayo es 4)
        const releaseDate = new Date(2026, 4, 24, 0, 0, 0).getTime();

        const countdownFunction = setInterval(function() {
            const now = new Date().getTime();
            const distance = releaseDate - now;

            // Cálculos matemáticos para días, horas, minutos y segundos
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Mostrar el resultado en el contenedor con ID "timer"
            document.getElementById("timer").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

            // Si la cuenta regresiva termina
            if (distance < 0) {
                clearInterval(countdownFunction);
                document.getElementById("timer").innerHTML = "¡YA DISPONIBLE!";
            }
        }, 1000);
    </script>
</body>
</html>
