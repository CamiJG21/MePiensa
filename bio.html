<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaynar - Enlaces</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background-color: #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .profile-container {
            position: relative;
            margin-bottom: 25px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center 25%; /* Ajuste para centrar el rostro */
            border: 4px solid transparent; /* Para el gradiente del borde */
            background-image: linear-gradient(#1a1a1a, #1a1a1a), linear-gradient(135deg, #00c6ff, #0072ff);
            background-origin: border-box;
            background-clip: content-box, border-box;
        }

        .glow {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background-color: #ff3b30; /* Luz roja en el gorro */
            border-radius: 50%;
            filter: blur(8px);
            opacity: 0.8;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: #ff3b30; /* Texto rojo */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .link-card.new-single {
            border: 2px solid rgba(0, 114, 255, 0.3); /* Borde azul suave */
            box-shadow: 0 0 20px rgba(0, 114, 255, 0.2); /* Resplandor azul */
        }

        .link-card.new-single:hover {
            box-shadow: 0 0 30px rgba(0, 114, 255, 0.4);
        }

        .card-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cover-img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .text-info {
            display: flex;
            flex-direction: column;
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background-color: #0072ff; /* Badge azul */
            color: #ffffff;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 20px;
        }

        .link-title {
            font-size: 16px;
            font-weight: 600;
        }

        .link-desc {
            font-size: 12px;
            color: #a0a0a0;
            margin-top: 3px;
        }

        .arrow {
            font-size: 18px;
            color: #505050;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #505050;
            text-align: center;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="profile-container">
            <div class="glow"></div>
            <img src="perfil.jpg" alt="Jaynar" class="profile-img">
        </div>

        <h1>JAYNAR</h1>
        <p class="subtitle">ARTISTA / PRODUCTOR</p>

        <div class="links-container">
            <a href="https://tupagina.com/me-piensa" class="link-card new-single" target="_blank">
                <div class="card-content">
                    <img src="me_piensa_cover.jpg" alt="Me Piensa" class="cover-img">
                    <div class="text-info">
                        <div class="title-row">
                            <span class="badge">NUEVO SENCILLO</span>
                            <p class="link-title">Me Piensa</p>
                        </div>
                        <p class="link-desc">Escucha la nueva canción aquí</p>
                    </div>
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="https://open.spotify.com/artist/tu_id_de_artista" class="link-card" target="_blank">
                <div class="card-content">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" alt="Spotify" class="cover-img" style="filter: brightness(0) invert(1);">
                    <div class="text-info">
                        <p class="link-title">Spotify</p>
                        <p class="link-desc">Escuchar en Spotify</p>
                    </div>
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="https://music.apple.com/artist/tu_id_de_artista" class="link-card" target="_blank">
                <div class="card-content">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/31/Apple_Music_logo.svg" alt="Apple Music" class="cover-img">
                    <div class="text-info">
                        <p class="link-title">Apple Music</p>
                        <p class="link-desc">Escuchar en Apple Music</p>
                    </div>
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="https://www.youtube.com/@tucanal" class="link-card" target="_blank">
                <div class="card-content">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.svg" alt="YouTube" class="cover-img">
                    <div class="text-info">
                        <p class="link-title">YouTube</p>
                        <p class="link-desc">Ver en YouTube</p>
                    </div>
                </div>
                <div class="arrow">→</div>
            </a>
        </div>
    </div>

    <p class="footer">&copy; 2026 JAYNAR. Todos los derechos reservados.</p>

</body>
</html>
