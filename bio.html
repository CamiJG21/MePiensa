<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAYNAR - Official Bio / Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-neon-blue: #0066ff;
            --pure-orange: #ff7b00;
            --background: #060606;
            --frosted-bg: rgba(18, 18, 18, 0.65);
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
            background-color: var(--background);
        }

        /* Fondo desenfocado dinámico con la foto de perfil */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('perfil.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(50px) brightness(25%) saturate(150%);
            transform: scale(1.1);
            z-index: -1;
        }

        /* Contenedor principal estilo frosted glass original */
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 1;
            background: var(--frosted-bg);
            padding: 35px 25px 25px 25px;
            border-radius: 28px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Borde del Avatar: Combinación Azul Eléctrico y Destello Fuego */
        .avatar-wrapper {
            position: relative;
            width: 115px;
            height: 115px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, var(--deep-neon-blue) 0%, #00d2ff 50%, var(--pure-orange) 100%);
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.6);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ZOOM MÁXIMO EN EL ROSTRO Y TOTALMENTE CENTRADO */
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            transform: scale(2.2); /* Zoom súper cerca al rostro */
            object-position: center 32%; /* Sube el encuadre para centrar los lentes/cara */
            border: 3px solid #121212;
            display: block;
            box-sizing: border-box;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 6px 0;
            letter-spacing: 1px;
            background: linear-gradient(180deg, #ffffff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* CAMBIO A TEXTO NEGRO SOLICITADO */
        h2 {
            font-size: 14px;
            color: #000000; 
            margin: 0 0 30px 0;
            font-weight: 800; /* Más grueso para que resalte */
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Enlaces / Botones de plataformas originales */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 20px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            text-decoration: none;
            padding: 15px 18px;
            border-radius: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            overflow: hidden;
        }

        .btn-link:hover {
            background-color: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .btn-content {
            display: flex;
            align-items: center;
            gap: 14px;
            text-align: left;
        }

        .btn-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-text {
            display: flex;
            flex-direction: column;
        }

        .platform-name {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.2;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .platform-action {
            font-size: 11px;
            color: #a7a7a7;
            font-weight: 400;
            margin-top: 2px;
        }

        .arrow {
            font-size: 13px;
            color: #8e8e93;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .btn-link:hover .arrow {
            transform: translateX(4px);
            color: #ffffff;
        }

        /* Destacado: "Me Piensa" en Tonos Azul Matrícula */
        .btn-featured {
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.15) 0%, rgba(0, 40, 150, 0.25) 100%);
            border: 1px solid rgba(0, 102, 255, 0.3);
            animation: pulseGlow 3s infinite ease-in-out;
        }
        
        .btn-featured:hover {
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.25) 0%, rgba(0, 60, 200, 0.35) 100%);
            border-color: rgba(0, 102, 255, 0.5);
            box-shadow: 0 10px 25px rgba(0, 102, 255, 0.4);
        }

        .btn-featured .btn-icon {
            color: #00d2ff;
        }

        /* Insignia con los colores de la matrícula */
        .badge-new {
            font-size: 9px;
            background: linear-gradient(135deg, var(--deep-neon-blue) 0%, var(--pure-orange) 100%);
            padding: 3px 7px;
            border-radius: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 0 8px rgba(0, 102, 255, 0.5);
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 102, 255, 0.15); }
            50% { box-shadow: 0 0 25px rgba(0, 102, 255, 0.35); }
        }

        /* Bordes de las Plataformas */
        .btn-spotify { border-left: 4px solid #1DB954; }
        .btn-spotify:hover { box-shadow: 0 8px 24px rgba(29, 185, 84, 0.12); }
        .btn-spotify .btn-icon { color: #1DB954; }

        .btn-apple { border-left: 4px solid #fc3c44; }
        .btn-apple:hover { box-shadow: 0 8px 24px rgba(252, 60, 68, 0.12); }
        .btn-apple .btn-icon { color: #fc3c44; }

        .btn-youtube { border-left: 4px solid #ff0000; }
        .btn-youtube:hover { box-shadow: 0 8px 24px rgba(255, 0, 0, 0.12); }
        .btn-youtube .btn-icon { color: #ff0000; }

        .footer {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 30px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-wrapper">
            <img src="perfil.jpg" alt="Jaynar Perfil" class="avatar">
        </div>
        
        <h1>JAYNAR</h1>
        <h2>Artista / Productor</h2>

        <div class="links-wrapper">
            <a href="links.html" class="btn-link btn-featured">
                <div class="btn-content">
                    <div class="btn-icon">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                    <div class="btn-text">
                        <span class="platform-name">Me Piensa <span class="badge-new">Nuevo Sencillo</span></span>
                        <span class="platform-action">Escucha la nueva canción aquí</span>
                    </div>
                </div>
                <span class="arrow">➔</span>
            </a>
